<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Job Application Tracker</title>
  <!--font-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<style>
  font-family: "Geist", sans-serif;
</style>

<!--tailwind-->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!--font awesome-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-100">
  <header class="w-[80%] md:w-[80%] mx-auto pt-5">
    <h1 class="text-3xl font-bold mb-5">Job Application Tracker</h1>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
      
      <div class="p-20 bg-white rounded-lg">
        <p class="text-2xl text-[#323B49] font-medium">Total</p>
        <span id="total" class="text-2xl font-bold pt-4">0</span>
      </div>
      
      <div class="p-20 bg-white rounded-lg">
        <p class="text-2xl text-[#323B49] font-medium">Interview</p>
        <p id="interview" class="text-2xl text-green-500 font-bold pt-4">0</p>
      </div>
      
      <div class="p-20 bg-white rounded-lg">
        <p class="text-2xl text-[#323B49] font-medium">Rejected</p>
        <p id="rejected" class="text-2xl text-red-500 font-bold pt-4">0</p>
      </div>
    </div>
  </header>
  <hr class="my-10">
  
  <main class="w-[80%] mx-auto">
    <div class="flex justify-between mb-5">
      <h2 class="text-xl font-semibold">Available Jobs</h2>
     <p class="text-gray-500"> <span id="jobs-count-badge">0</span> jobs</p>
    </div>
     
   <div class="flex gap-2 mb-4">
    <button id="allBtn" class="px-3 py-1 bg-blue-600 text-white rounded">All</button>
    <button id="interviewBtn" class="px-3 py-1 bg-white text-gray-500 rounded">Interview</button>
    <button id="rejectedBtn" class="px-3 py-1 bg-white text-gray-500 rounded">Rejected</button>
  </div>

  <!-- Job List -->
  <div id="jobList" class="space-y-4"></div>

     
  </main>
  
  <script src="script.js"></script>
</body>
</html>
